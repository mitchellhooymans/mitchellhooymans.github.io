<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BSE Stellar Evolution Explorer</title>
<meta name="description" content="Interactive explorer for the 16 BSE stellar types from Hurley et al. (2000, 2002)" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: #080c12;
    color: #c0d0e0;
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0a0e15; }
  ::-webkit-scrollbar-thumb { background: #2a3545; border-radius: 3px; }
  button { font-family: inherit; }
  input[type="range"] { accent-color: #50e0a0; }
  input[type="checkbox"] { accent-color: #995533; }

  /* Mono utility */
  .mono { font-family: 'DM Mono', 'Consolas', monospace; }

  /* Layout */
  .app-header {
    border-bottom: 1px solid #1a2535;
    padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .app-body {
    display: flex; min-height: calc(100vh - 64px);
  }
  .main-panel {
    flex: 1; padding: 16px 20px; overflow: auto; min-width: 0;
  }
  .side-panel {
    width: 360px; flex-shrink: 0;
    border-left: 1px solid #1a2535; background: #0a0e16;
    overflow-y: auto; padding: 16px;
  }
  @media (max-width: 900px) {
    .app-body { flex-direction: column; }
    .side-panel { width: 100%; border-left: none; border-top: 1px solid #1a2535; }
  }

  /* Tab bar */
  .tab-bar {
    display: flex; gap: 2px;
    background: #0d1520; border-radius: 6px; padding: 3px;
    border: 1px solid #1a2535;
  }
  .tab-btn {
    padding: 6px 14px; border: none;
    border-bottom: 2px solid transparent;
    background: transparent; color: #667788;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: 'DM Mono', monospace; letter-spacing: 0.3px;
    transition: color 0.15s;
  }
  .tab-btn:hover { color: #99aabb; }
  .tab-btn.active { color: #e0f0e8; border-bottom-color: #50e0a0; }

  /* Info sub-tabs */
  .info-tab {
    padding: 3px 10px; border: 1px solid transparent;
    border-radius: 4px; background: transparent;
    color: #556677; font-size: 11px; cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .info-tab:hover { color: #889; }
  .info-tab.active {
    border-color: #334455; background: #0d1520; color: #c0d0e0;
  }

  /* Card */
  .card {
    background: #0a0e16; border: 1px solid #1a2535; border-radius: 8px;
    overflow: hidden;
  }
  .card-inner { padding: 20px; }

  /* Controls bar */
  .controls-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; padding: 8px 14px;
    background: #0a0e16; border: 1px solid #1a2535; border-radius: 8px;
    flex-wrap: wrap;
  }
  .controls-bar label { font-size: 11px; color: #556677; display: flex; align-items: center; gap: 5px; }

  /* Type button */
  .type-btn {
    font-size: 10px; padding: 4px 8px; border-radius: 3px; text-align: left;
    background: transparent; border: 1px solid transparent;
    color: #667788; cursor: pointer;
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.12s;
  }
  .type-btn:hover { color: #99aabb; background: #111820; }
  .type-btn.active { background: #1a2535; border-color: #2a3545; color: #e0f0e8; }

  /* Connection button */
  .conn-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 4px;
    background: #0d1520; border: 1px solid #1a2535;
    color: #99aabb; cursor: pointer;
    font-family: 'DM Mono', monospace;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.12s;
  }
  .conn-btn:hover { border-color: #3a4555; color: #c0d0e0; }
  .conn-btn.binary { background: #1a1510; border-color: #332a20; color: #cc9966; }
  .conn-btn.binary:hover { border-color: #554433; }

  /* Dot */
  .dot {
    display: inline-block; border-radius: 50%; flex-shrink: 0;
  }

  /* Process card */
  .process-card {
    padding: 14px 16px; background: #0d1520;
    border: 1px solid #1a2535; border-radius: 6px;
  }
  .process-card h3 {
    font-size: 13px; color: #50e0a0;
    font-family: 'DM Mono', monospace; margin-bottom: 6px;
  }
  .process-card p { font-size: 12px; color: #889; line-height: 1.6; }

  /* Legend */
  .legend {
    display: flex; gap: 20px; margin-top: 8px; padding: 6px 14px;
    font-size: 10px; color: #556677;
    font-family: 'DM Mono', monospace; flex-wrap: wrap;
  }

  /* SVG interaction */
  .node-group { cursor: pointer; }
  .node-group:hover rect { stroke: #88aacc !important; }
</style>
</head>
<body>

];

const critMasses = [
  { n:'M_hook', v:'~1.0', d:'Above which MS hook feature appears' },
  { n:'M_HeF',  v:'~2.0', d:'Max mass for degenerate He flash (LM/IM boundary)' },
  { n:'M_FGB',  v:'~13',  d:'Max mass for He ignition on GB (IM/HM boundary)' },
  { n:'M_up',   v:'~8',   d:'Min mass for off-center C ignition → ONe WD' },
  { n:'M_ec',   v:'~10',  d:'Min mass for non-degenerate C → core collapse' },
  { n:'M_Ch',   v:'1.44', d:'Chandrasekhar limit for white dwarfs' },
];

const binaryProcs = [
  { n:'Roche Lobe Overflow (RLOF)', d:'Star fills Roche lobe → mass flows through L₁. Stability: q₁ vs q_crit. Stable RLOF on nuclear/thermal timescales; unstable → dynamical MT or CE. Nuclear: Ṁ = F(M)[ln(R/R_L)]³ [Eq. 58]; thermal: Ṁ_KH = M/τ_KH [Eq. 60].' },
  { n:'Common Envelope (CE)', d:'Unstable MT engulfs both stars. Cores spiral in, depositing orbital energy with efficiency α_CE. α·λ formalism: E_bind = α(E_orb,f − E_orb,i) [Eqs. 69–72]. Outcome: tighter binary or coalescence. λ varies with stellar structure.' },
  { n:'Wind Accretion', d:'Bondi–Hoyle accretion from stellar wind. ⟨Ṁ_2A⟩ ∝ (GM₂/v_w)² · (1/(2a²)) · Ṁ_1w [Eq. 6, Hurley+2002]. Important for symbiotic stars and massive X-ray binaries. Wind velocity: v²_w = 2β_w·GM/R.' },
  { n:'Tidal Evolution', d:'Convective damping (equilibrium tide): τ_circ from Rasio+(1996), using eddy turnover timescale [Eq. 31]. Radiative damping (dynamical tide): Zahn (1977), τ_circ from E₂ coefficient [Eq. 41]. Degenerate: Campbell (1984) synchronization [Eq. 46].' },
  { n:'Supernova Kicks', d:'Natal kicks from asymmetric explosion. Standard: Maxwellian σ=265 km/s [Hobbs+2005]. ECSN: σ≈20 km/s. COSMIC: fallback reduction v_k × (1−f_fb). Post-SN orbital parameters from Appendix A1, Hurley+2002.' },
  { n:'Magnetic Braking', d:'J̇_mb = −5.83×10⁻¹⁶ (M_env/M)(RΩ_spin)³ [Eq. 50, Hurley+2002]. Shut off for fully convective stars (M < 0.35) → explains CV period gap between 2–3 hr.' },
];

const phases = [
  { l:'Core H', ids:[0,1], c:'#4D9EF7' },
  { l:'Shell H', ids:[2,3], c:'#F0D050' },
  { l:'Core He', ids:[4,7], c:'#E8C820' },
  { l:'Shell He', ids:[5,8], c:'#E05030' },
  { l:'Double shell', ids:[6,9], c:'#C01818' },
  { l:'Remnants', ids:[10,11,12,13,14,15], c:'#B090F0' },
];

// ─── Components ───
function FlowChart({ selected, setSelected, massIdx, showBin }) {
  const W=1060, H=440;
  const track = massTracks[massIdx].path;
  const onTrack = id => track.includes(id);

  const edges = [];
  BSE.forEach(s => {
    s.sTo.forEach(tid => { const t=BSE.find(x=>x.id===tid); if(t) edges.push({f:s,t,type:'single'}); });
    if(showBin) s.bTo.forEach(tid => { const t=BSE.find(x=>x.id===tid); if(t) edges.push({f:s,t,type:'binary'}); });
  });

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',minHeight:380}}>
      <defs>
        <marker id="as" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,1 L10,5 L0,9" fill="none" stroke="#667" strokeWidth="1.5"/>
        </marker>
        <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,1 L10,5 L0,9" fill="none" stroke="#964" strokeWidth="1.5"/>
        </marker>
        <marker id="at" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#50e0a0"/>
        </marker>
      </defs>
      {/* Phase labels */}
      {[['Core H',80],['Shell H',305],['Core He',455],['Shell He',605],['Dbl Shell',755],['Remnants',895]].map(([l,x])=>(
        <text key={l} x={x} y={435} fill="#445" fontSize="9" textAnchor="middle" className="mono">{l}</text>
      ))}
      {/* Edges */}
      {edges.map((e,i) => {
        const fx=e.f.fp.x, fy=e.f.fp.y, tx=e.t.fp.x, ty=e.t.fp.y;
        const single = e.type==='single';
        const isTE = onTrack(e.f.id) && onTrack(e.t.id) &&
          track.indexOf(e.t.id) === track.indexOf(e.f.id)+1;
        const dx=tx-fx, dy=ty-fy, len=Math.sqrt(dx*dx+dy*dy)||1;
        const mx=(fx+tx)/2, my=(fy+ty)/2;
        const ox=-dy/len*(single?0:15), oy=dx/len*(single?0:15);
        return <path key={i}
          d={`M${fx},${fy} Q${mx+ox},${my+oy} ${tx},${ty}`}
          fill="none"
          stroke={isTE?'#50e0a0':single?'#445':'#753'}
          strokeWidth={isTE?2.5:1.1}
          strokeDasharray={single?'none':'6,3'}
          markerEnd={`url(#${isTE?'at':single?'as':'ab'})`}
          opacity={isTE?1:0.45}
        />;
      })}
      {/* Nodes */}
      {BSE.map(s => {
        const x=s.fp.x, y=s.fp.y, sel=s.id===selected, ot=onTrack(s.id);
        return (
          <g key={s.id} className="node-group" onClick={()=>setSelected(s.id)}>
            {ot && <circle cx={x} cy={y} r={24} fill="#50e0a018" stroke="#50e0a040" strokeWidth={1}/>}
            <rect x={x-40} y={y-18} width={80} height={36} rx={6}
              fill={sel?'#1a2535':'#0c1118'}
              stroke={sel?s.col:ot?'#50e0a050':'#1a2535'}
              strokeWidth={sel?2:1}
            />
            <circle cx={x-24} cy={y-3} r={5}
              fill={s.id===14?'#000':s.col}
              stroke={s.id===14?'#555':'none'}
            />
            <text x={x+4} y={y-4} fill={sel?'#fff':'#889'} fontSize="8" textAnchor="middle" className="mono">
              k={s.id}
            </text>
            <text x={x} y={y+11} fill={sel?'#bcc':'#556'} fontSize="7.5" textAnchor="middle" className="mono">
              {s.short}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function HRDiagram({ selected, setSelected, massIdx }) {
  const W=500, H=500, pad=50;
  const tMin=3.3, tMax=5.6, lMin=-5.5, lMax=6.0;
  const toX = t => pad + ((tMax-t)/(tMax-tMin))*(W-2*pad);
  const toY = l => pad + ((lMax-l)/(lMax-lMin))*(H-2*pad);
  const track = massTracks[massIdx].path;
  const onTrack = id => track.includes(id);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',minHeight:380}}>
      {/* Grid */}
      {[3.5,4.0,4.5,5.0].map(t=><line key={t} x1={toX(t)} y1={pad} x2={toX(t)} y2={H-pad} stroke="#151e2a"/>)}
      {[-4,-2,0,2,4].map(l=><line key={l} x1={pad} y1={toY(l)} x2={W-pad} y2={toY(l)} stroke="#151e2a"/>)}
      {/* Axis labels */}
      {[3.5,4.0,4.5,5.0].map(t=><text key={t} x={toX(t)} y={H-pad+16} fill="#556" fontSize="10" textAnchor="middle" className="mono">{t.toFixed(1)}</text>)}
      {[-4,-2,0,2,4].map(l=><text key={l} x={pad-8} y={toY(l)+4} fill="#556" fontSize="10" textAnchor="end" className="mono">{l}</text>)}
      <text x={W/2} y={H-8} fill="#667" fontSize="11" textAnchor="middle" className="mono">log T_eff (K)  ← hotter</text>
      <text x={12} y={H/2} fill="#667" fontSize="11" textAnchor="middle" className="mono" transform={`rotate(-90,12,${H/2})`}>log L/L☉ ↑</text>
      {/* MS band */}
      <path d={`M${toX(3.5)},${toY(-1.5)} Q${toX(3.9)},${toY(1)} ${toX(4.6)},${toY(4)} L${toX(5.0)},${toY(5.5)}`}
        stroke="#4D9EF715" strokeWidth={28} fill="none"/>
      {/* Track connections */}
      {track.length > 1 && track.slice(0,-1).map((id,i) => {
        const a=BSE.find(s=>s.id===id), b=BSE.find(s=>s.id===track[i+1]);
        if(!a||!b) return null;
        const ax=toX(a.hr.t), ay=toY(a.hr.l), bx=toX(b.hr.t), by=toY(b.hr.l);
        return <line key={i} x1={ax} y1={ay} x2={bx} y2={by} stroke="#50e0a030" strokeWidth={2}/>;
      })}
      {/* Stars */}
      {BSE.map(s => {
        const cx=toX(s.hr.t), cy=toY(s.hr.l);
        if(cx<pad-5||cx>W-pad+5||cy<pad-5||cy>H-pad+5) return null;
        const sel=s.id===selected, ot=onTrack(s.id);
        return (
          <g key={s.id} className="node-group" onClick={()=>setSelected(s.id)}>
            {sel && <circle cx={cx} cy={cy} r={18} fill={s.col} opacity={0.12}/>}
            {ot && <circle cx={cx} cy={cy} r={14} fill="#50e0a0" opacity={0.1}/>}
            <circle cx={cx} cy={cy} r={sel?7:4.5}
              fill={s.id===14?'#000':s.col}
              stroke={sel?'#fff':ot?'#50e0a0':'none'}
              strokeWidth={sel?2:1} opacity={sel||ot?1:0.55}
            />
            <text x={cx} y={cy-(sel?12:9)} fill={sel?'#ddd':'#778'} fontSize="7.5" textAnchor="middle" className="mono">
              {s.short}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function App() {
  const [sel, setSel] = useState(1);
  const [tab, setTab] = useState('flow');
  const [mIdx, setMIdx] = useState(3);
  const [showBin, setShowBin] = useState(true);
  const [iTab, setITab] = useState('overview');

  const star = BSE.find(s=>s.id===sel);

  return (
    <div>
      {/* Header */}
      <header className="app-header">
        <div>
          <h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.3px',color:'#e0f0e8'}} className="mono">
            <span style={{color:'#50e0a0'}}>BSE</span> Stellar Evolution Explorer
          </h1>
          <p style={{fontSize:11,color:'#556',marginTop:3}} className="mono">
            Hurley, Pols & Tout (2000) · Hurley, Tout & Pols (2002) · k = 0–15
          </p>
        </div>
        <div className="tab-bar">
          {[['flow','Evolution Flow'],['hr','H-R Diagram'],['binary','Binary Physics'],['masses','Critical Masses']].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </header>

      <div className="app-body">
        {/* Main */}
        <div className="main-panel">
          {(tab==='flow'||tab==='hr') && (
            <div className="controls-bar">
              <span className="mono" style={{fontSize:11,color:'#556',whiteSpace:'nowrap'}}>MASS TRACK</span>
              <input type="range" min={0} max={massTracks.length-1} value={mIdx}
                onChange={e=>setMIdx(+e.target.value)} style={{flex:'0 0 160px'}}/>
              <span className="mono" style={{fontSize:13,color:'#50e0a0',fontWeight:500,minWidth:55}}>
                {massTracks[mIdx].label}
              </span>
              <span className="mono" style={{fontSize:11,color:'#667'}}>
                {massTracks[mIdx].note}
              </span>
              {tab==='flow' && (
                <label className="mono" style={{marginLeft:'auto'}}>
                  <input type="checkbox" checked={showBin} onChange={e=>setShowBin(e.target.checked)}/> Binary paths
                </label>
              )}
            </div>
          )}

          <div className="card">
            {tab==='flow' && <FlowChart selected={sel} setSelected={setSel} massIdx={mIdx} showBin={showBin}/>}
            {tab==='hr' && <HRDiagram selected={sel} setSelected={setSel} massIdx={mIdx}/>}

            {tab==='binary' && (
              <div className="card-inner">
                <h2 className="mono" style={{fontSize:15,color:'#e0f0e8',marginBottom:14}}>Binary Interaction Processes</h2>
                <div style={{display:'grid',gap:10}}>
                  {binaryProcs.map((p,i)=>(
                    <div key={i} className="process-card"><h3>{p.n}</h3><p>{p.d}</p></div>
                  ))}
                </div>
              </div>
            )}

            {tab==='masses' && (
              <div className="card-inner">
                <h2 className="mono" style={{fontSize:15,color:'#e0f0e8',marginBottom:6}}>Critical Masses (Z = 0.02)</h2>
                <p style={{fontSize:12,color:'#667',marginBottom:14,lineHeight:1.6}}>
                  Boundary masses dividing distinct evolutionary regimes. Functions of Z (Eqs. 1–3, Hurley+2000).
                </p>
                <div style={{display:'grid',gap:6}}>
                  {critMasses.map((m,i)=>(
                    <div key={i} className="process-card" style={{display:'flex',alignItems:'center',gap:14,padding:'8px 14px'}}>
                      <span className="mono" style={{fontSize:13,color:'#50e0a0',fontWeight:500,minWidth:60}}>{m.n}</span>
                      <span className="mono" style={{fontSize:13,color:'#e0f0e8',minWidth:65}}>{m.v} M☉</span>
                      <span style={{fontSize:12,color:'#778'}}>{m.d}</span>
                    </div>
                  ))}
                </div>
                <h3 className="mono" style={{fontSize:13,color:'#e0f0e8',marginTop:20,marginBottom:10}}>Burning Phase Categories</h3>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:6}}>
                  {phases.map((p,i)=>(
                    <div key={i} className="process-card" style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px'}}>
                      <span className="dot" style={{width:8,height:8,background:p.c}}/>
                      <div>
                        <div className="mono" style={{fontSize:11,color:'#bcc'}}>{p.l}</div>
                        <div className="mono" style={{fontSize:9,color:'#445'}}>k = {p.ids.join(', ')}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {tab==='flow' && (
            <div className="legend">
              <span>── Single-star path</span>
              <span style={{color:'#964'}}>- - Binary-only path</span>
              <span style={{color:'#50e0a0'}}>━ Active mass track</span>
              <span>Based on Fig. 19, Hurley et al. (2002)</span>
            </div>
          )}
        </div>

        {/* Sidebar */}
        <div className="side-panel">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <span className="dot" style={{width:12,height:12,
              background:star.id===14?'#000':star.col,
              border:star.id===14?'1.5px solid #555':'none'}}/>
            <span className="mono" style={{fontSize:11,color:'#556',padding:'1px 7px',background:'#0d1520',border:'1px solid #1a2535',borderRadius:4}}>
              k = {star.id}
            </span>
          </div>
          <h2 style={{fontSize:16,fontWeight:700,color:'#e0f0e8',lineHeight:1.2,marginBottom:3}}>{star.name}</h2>
          <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
            <span className="mono" style={{fontSize:11,color:'#50e0a0'}}>{star.mass}</span>
            <span className="mono" style={{fontSize:11,color:'#667'}}>{star.burn}</span>
          </div>

          <div style={{display:'flex',gap:3,marginBottom:12,flexWrap:'wrap'}}>
            {[['overview','Overview'],['phys','SSE Physics'],['bse','Binary (BSE)']].map(([k,l])=>(
              <button key={k} className={`info-tab${iTab===k?' active':''}`} onClick={()=>setITab(k)}>{l}</button>
            ))}
          </div>

          <p style={{fontSize:12.5,color:'#99aabb',lineHeight:1.7,marginBottom:18}}>
            {iTab==='overview'?star.desc:iTab==='phys'?star.phys:star.bse}
          </p>

          <div style={{borderTop:'1px solid #1a2535',paddingTop:12}}>
            {star.from.length>0 && (
              <div style={{marginBottom:10}}>
                <div className="mono" style={{fontSize:10,color:'#556',letterSpacing:1,marginBottom:5}}>← EVOLVES FROM</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                  {star.from.map(id=>{const s=BSE.find(x=>x.id===id); return(
                    <button key={id} className="conn-btn" onClick={()=>setSel(id)}>
                      <span className="dot" style={{width:5,height:5,background:s.col}}/>{s.short}
                    </button>
                  );})}
                </div>
              </div>
            )}
            {star.sTo.length>0 && (
              <div style={{marginBottom:10}}>
                <div className="mono" style={{fontSize:10,color:'#556',letterSpacing:1,marginBottom:5}}>SINGLE-STAR →</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                  {star.sTo.map(id=>{const s=BSE.find(x=>x.id===id); return(
                    <button key={id} className="conn-btn" onClick={()=>setSel(id)}>
                      <span className="dot" style={{width:5,height:5,background:s.col}}/>{s.short}
                    </button>
                  );})}
                </div>
              </div>
            )}
            {star.bTo.length>0 && (
              <div style={{marginBottom:10}}>
                <div className="mono" style={{fontSize:10,color:'#964',letterSpacing:1,marginBottom:5}}>BINARY-ONLY →</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                  {star.bTo.map(id=>{const s=BSE.find(x=>x.id===id); return(
                    <button key={id} className="conn-btn binary" onClick={()=>setSel(id)}>
                      <span className="dot" style={{width:5,height:5,background:s.col}}/>{s.short}
                    </button>
                  );})}
                </div>
              </div>
            )}
          </div>

          <div style={{borderTop:'1px solid #1a2535',paddingTop:12,marginTop:6}}>
            <div className="mono" style={{fontSize:10,color:'#556',letterSpacing:1,marginBottom:6}}>ALL TYPES</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2}}>
              {BSE.map(s=>(
                <button key={s.id} className={`type-btn${s.id===sel?' active':''}`} onClick={()=>setSel(s.id)}>
                  <span className="dot" style={{width:5,height:5,
                    background:s.id===14?'#000':s.col,
                    border:s.id===14?'1px solid #555':'none'}}/>
                  <span style={{opacity:0.5}}>{s.id}</span> {s.short}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
